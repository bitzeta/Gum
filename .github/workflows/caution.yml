name: divide

on:
  push:

jobs:
  vibrate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        camel: ["crossing", "package", "lobby", "injection", "reservoir"]
        bone: ["mainframe", "initial", "nobody", "grind"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar gD.jar
